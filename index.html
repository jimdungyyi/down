<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoosyCozy Download</title>
    <meta name="description" content="루지코지 베타 버전을 바로 다운로드할 수 있는 공식 페이지입니다.">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="page-shell">
        <header class="topbar">
            <div class="brand-block">
                <p class="eyebrow">ROOSYCOZY OFFICIAL</p>
                <h1 class="brand-title">RoosyCozy 다운로드</h1>
            </div>
        </header>

        <main class="hero-card">
            <section class="download-panel">
                <span class="hero-badge">DOWNLOAD</span>
                <a href="roosycozy-portable-exe.zip" download class="download-button" onclick="trackDownload()">
                    <span class="button-label">RoosyCozy 베타 다운로드</span>
                    <span class="button-meta">roosycozy-portable-exe.zip</span>
                </a>
            </section>

            <section class="info-stack">
                <div class="quick-steps" aria-label="빠른 실행 순서">
                    <div class="step-pill">
                        <strong>1</strong>
                        <span>ZIP 다운로드</span>
                    </div>
                    <div class="step-pill">
                        <strong>2</strong>
                        <span>압축 풀기</span>
                    </div>
                    <div class="step-pill">
                        <strong>3</strong>
                        <span>폴더 안에서 실행</span>
                    </div>
                </div>

                <div class="note-card">
                    <h2>꼭 확인해 주세요</h2>
                    <ul class="note-list">
                        <li>파일은 보통 <b>다운로드</b> 폴더에 저장됩니다.</li>
                        <li>압축을 푼 뒤, 폴더 안에서 실행해야 정상 동작합니다.</li>
                        <li>윈도우 경고창이 뜨면 <b>추가 정보 → 실행</b>을 눌러 주세요.</li>
                    </ul>
                </div>

                <div class="warning-panel">
                    <h2>윈도우 보호 창이 뜨면</h2>
                    <div class="warning-grid">
                        <figure>
                            <img src="warning_win_1.png" alt="추가 정보 버튼">
                            <figcaption>1. 추가 정보 클릭</figcaption>
                        </figure>
                        <figure>
                            <img src="warning_win_2.png" alt="실행 버튼">
                            <figcaption>2. 실행 클릭</figcaption>
                        </figure>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzlGdBouqHmaHJzY1qP9VNaB_G0CJomirBvniezApbDPk-9HdNajTmeiqVvG78veTzw/exec";

        function getUserId() {
            let userId = localStorage.getItem("roosy_user_id");

            if (!userId) {
                const randomStr =
                    Math.random().toString(36).substring(2, 10) +
                    Math.random().toString(36).substring(2, 6);
                userId = "user_" + randomStr;
                localStorage.setItem("roosy_user_id", userId);
            }

            return userId;
        }

        function trackDownload() {
            const userId = getUserId();
            const action = "DOWNLOAD_ACTION";
            const version = "download_only_page";
            const finalUrl =
                `${SCRIPT_URL}?id=${userId}&action=${action}&version=${version}&t=${Date.now()}`;

            fetch(finalUrl, { method: "GET", mode: "no-cors" }).catch((error) => {
                console.error("다운로드 기록 실패", error);
            });
        }
    </script>
</body>

</html>
